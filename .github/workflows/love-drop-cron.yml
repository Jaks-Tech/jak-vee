name: Love Drop Cron

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  send-love-drop:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger love drop
        run: |
          SITE_URL="${{ secrets.SITE_URL }}"
          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://jak-vee.us"
          fi
          SITE_URL="${SITE_URL%/}"
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$SITE_URL/api/ai/love-drop"
